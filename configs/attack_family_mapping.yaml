# Attack Family Mapping Configuration
# Maps fine-grained labels (from dataset loaders) to coarse attack families
# Used ONLY for evaluation/diagnosis, NOT for training.
#
# Format per dataset:
#   <dataset>:
#     mapping:
#       <label_index>: <family_label>
#     families:
#       - <family_label_1>
#       - <family_label_2>

NSLKDD:
  mapping:
    0: "Normal"
    1: "DoS"
    2: "Probe"
    3: "Privilege/Access"
    4: "Privilege/Access"
  families:
    - "Normal"
    - "DoS"
    - "Probe"
    - "Privilege/Access"
  label_names:
    0: "Normal"
    1: "DoS"
    2: "Probe"
    3: "U2R"
    4: "R2L"

